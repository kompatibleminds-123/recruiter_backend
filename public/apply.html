<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apply | RecruitDesk</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --card: #fffaf2;
        --ink: #172033;
        --muted: #5f6b7a;
        --line: #e5d8be;
        --brand: #b87416;
        --brand-dark: #8c5a11;
        --ok: #166534;
        --error: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(184,116,22,0.10), transparent 28%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .wrap {
        width: min(920px, calc(100% - 32px));
        margin: 32px auto 56px;
      }
      .hero, .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 18px 42px rgba(35, 24, 8, 0.08);
      }
      .hero {
        padding: 28px;
        margin-bottom: 20px;
      }
      .eyebrow {
        font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brand);
      }
      h1 {
        margin: 12px 0 10px;
        font-size: clamp(30px, 5vw, 48px);
        line-height: 1;
      }
      .sub {
        color: var(--muted);
        max-width: 720px;
        font-size: 16px;
        line-height: 1.6;
      }
      .job-copy {
        display: grid;
        gap: 16px;
      }
      .job-copy p {
        margin: 0;
      }
      .job-copy-section {
        display: grid;
        gap: 8px;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
      }
      .job-copy-section h3 {
        margin: 0;
        font: 700 16px/1.3 ui-sans-serif, system-ui, sans-serif;
        color: var(--ink);
      }
      .job-copy-section ul {
        margin: 0;
        padding-left: 18px;
      }
      .job-copy-section li {
        margin: 0 0 8px;
      }
      .meta {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        font-size: 13px;
      }
      .card {
        padding: 24px;
      }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .full { grid-column: 1 / -1; }
      label {
        display: block;
        margin-bottom: 7px;
        font: 700 14px/1.3 ui-sans-serif, system-ui, sans-serif;
      }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 14px;
        padding: 12px 14px;
        font: 14px/1.4 ui-sans-serif, system-ui, sans-serif;
      }
      textarea { min-height: 110px; resize: vertical; }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 14px;
        background: var(--brand);
        color: #fff;
        padding: 13px 18px;
        font: 700 14px/1 ui-sans-serif, system-ui, sans-serif;
        cursor: pointer;
      }
      button:hover { background: var(--brand-dark); }
      button[disabled] { opacity: 0.6; cursor: progress; }
      .status {
        margin-top: 14px;
        font: 600 14px/1.4 ui-sans-serif, system-ui, sans-serif;
      }
      .status.ok { color: var(--ok); }
      .status.error { color: var(--error); }
      .hint {
        margin-top: 8px;
        color: var(--muted);
        font: 13px/1.5 ui-sans-serif, system-ui, sans-serif;
      }
      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div class="eyebrow">RecruitDesk Apply</div>
        <h1 id="jobTitle">Loading role...</h1>
        <div class="sub" id="jobDescription">Please wait while we load the job details.</div>
        <div class="meta" id="jobMeta"></div>
      </section>

      <section class="card">
        <form id="applyForm">
          <div class="grid">
            <div>
              <label for="candidateName">Your Name</label>
              <input id="candidateName" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" type="email" required />
            </div>
            <div>
              <label for="phone">Phone</label>
              <input id="phone" required />
            </div>
            <div>
              <label for="location">Location</label>
              <input id="location" required />
            </div>
            <div>
              <label for="currentCompany">Current Company</label>
              <input id="currentCompany" />
            </div>
            <div>
              <label for="currentDesignation">Current Designation</label>
              <input id="currentDesignation" />
            </div>
            <div>
              <label for="totalExperience">Total Experience</label>
              <input id="totalExperience" placeholder="0-2 years" />
            </div>
            <div>
              <label for="noticePeriod">Notice Period</label>
              <input id="noticePeriod" placeholder="Immediate / 30 days" />
            </div>
            <div class="full">
              <label for="skills">Skills</label>
              <input id="skills" placeholder="Java, Python, React" />
            </div>
            <div class="full">
              <label for="screeningAnswers">Additional Message</label>
              <textarea id="screeningAnswers" placeholder="Share anything you want the recruiter to know."></textarea>
            </div>
            <div class="full">
              <label for="cvFile">Upload CV</label>
              <input id="cvFile" type="file" accept=".pdf,.doc,.docx,.rtf,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/rtf,text/plain" />
              <div class="hint">PDF preferred. This route is designed to support direct CV upload.</div>
            </div>
          </div>
          <div class="actions">
            <button id="applySubmit" type="submit">Submit Application</button>
          </div>
          <div class="status" id="applyStatus"></div>
        </form>
      </section>
    </div>

    <script src="/public/apply.js"></script>
  </body>
</html>
