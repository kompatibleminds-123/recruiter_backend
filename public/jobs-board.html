<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Jobs</title>
    <link id="jobsFavicon" rel="icon" href="/portal-app/favicon.png" />
    <link rel="stylesheet" href="/public/jobs-board.css" />
  </head>
  <body>
    <main class="jobs-shell">
      <header class="jobs-head">
        <h1 id="jobsTitle">Open Jobs</h1>
        <p id="jobsSubtitle">Explore active openings and apply directly.</p>
      </header>
      <section class="jobs-search" aria-label="Search jobs">
        <label>
          <span>Keyword</span>
          <input id="keywordSearch" type="search" placeholder="Search by role, skill, keyword..." autocomplete="off" />
        </label>
        <label>
          <span>Location</span>
          <input id="locationSearch" type="search" placeholder="City, remote, anywhere..." autocomplete="off" />
        </label>
      </section>
      <div id="jobsStatus" class="jobs-status"></div>
      <section class="jobs-layout">
        <div>
          <div class="jobs-section-title">Recent Jobs</div>
          <section id="jobsList" class="jobs-list"></section>
        </div>
        <div>
          <div class="jobs-section-title">Job Spotlight</div>
          <aside class="job-spotlight" id="jobSpotlight" aria-label="Job spotlight"></aside>
        </div>
      </section>
    </main>
    <script src="/public/jobs-board.js"></script>
  </body>
  </html>
