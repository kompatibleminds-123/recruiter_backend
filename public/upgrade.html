<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecruitDesk Upgrade</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f6f8fb;
        color: #1f2937;
      }
      .wrap {
        max-width: 760px;
        margin: 24px auto;
        padding: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 14px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .muted {
        color: #6b7280;
      }
      .row {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fbff;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        background: #0f766e;
        color: #fff;
      }
      .small {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Upgrade Workspace</h1>
        <div class="muted">Continue your RecruitDesk plan activation.</div>
        <div class="row">
          <div><strong>Selected plan:</strong> <span id="planLabel">-</span></div>
          <div><strong>Company ID:</strong> <span id="companyId">-</span></div>
          <div><strong>Email:</strong> <span id="email">-</span></div>
        </div>
        <button id="payBtn" class="btn" type="button" style="background:#1d4ed8;">Pay with Razorpay</button>
        <div class="muted small" id="expiresAt"></div>
        <div class="muted small" id="paymentStatus"></div>
        <div class="muted small">Payment checkout wiring can be plugged here (Razorpay/Stripe) in next step.</div>
      </div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = String(params.get("token") || "").trim();
      const planMap = {
        ext_499_1_user: "Extension Lite - Rs 499",
        ext_999_3_users: "Extension Team - Rs 999",
        ext_1999_7_users: "Extension Pro - Rs 1999",
        saas_4999_unlimited: "SaaS - Rs 4999"
      };
      const planLabel = document.getElementById("planLabel");
      const companyLabel = document.getElementById("companyId");
      const emailLabel = document.getElementById("email");
      const expiryLabel = document.getElementById("expiresAt");
      const payBtn = document.getElementById("payBtn");
      const paymentStatus = document.getElementById("paymentStatus");
      let latestCtx = null;

      async function loadUpgradeContext() {
        if (!token) throw new Error("Missing token.");
        const response = await fetch(`/upgrade/context?token=${encodeURIComponent(token)}`);
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Invalid or expired upgrade link.");
        }
        const payload = await response.json();
        if (!payload?.ok) throw new Error(String(payload?.error || "Invalid upgrade link."));
        return payload.result || {};
      }

      loadUpgradeContext()
        .then((ctx) => {
          latestCtx = ctx;
          const planCode = String(ctx.planCode || "").trim();
          const companyId = String(ctx.companyId || "").trim();
          const email = String(ctx.email || "").trim();
          const label = planMap[planCode] || planCode || "Not selected";
          planLabel.textContent = label;
          companyLabel.textContent = companyId || "-";
          emailLabel.textContent = email || "-";
          if (ctx.expiresAt) {
            const d = new Date(Number(ctx.expiresAt));
            expiryLabel.textContent = Number.isFinite(d.getTime()) ? `Link expires: ${d.toLocaleString()}` : "";
          }
          if (!ctx.razorpayEnabled) {
            payBtn.style.display = "none";
          }
        })
        .catch((error) => {
          planLabel.textContent = "Invalid";
          companyLabel.textContent = "-";
          emailLabel.textContent = "-";
          payBtn.style.display = "none";
          expiryLabel.textContent = String(error?.message || error);
        });

      payBtn.addEventListener("click", async () => {
        try {
          if (!latestCtx) throw new Error("Upgrade context not loaded.");
          const orderRes = await fetch("/upgrade/create-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
          });
          const orderPayload = await orderRes.json();
          if (!orderRes.ok || !orderPayload?.ok) {
            throw new Error(String(orderPayload?.error || "Could not create payment order."));
          }
          const order = orderPayload.result || {};
          const rzp = new window.Razorpay({
            key: order.keyId,
            amount: order.amount,
            currency: order.currency || "INR",
            name: "RecruitDesk",
            description: `Plan upgrade (${order.planCode})`,
            order_id: order.orderId,
            handler: async function (response) {
              const verifyRes = await fetch("/upgrade/verify-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  token,
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature
                })
              });
              const verifyPayload = await verifyRes.json();
              if (!verifyRes.ok || !verifyPayload?.ok) {
                throw new Error(String(verifyPayload?.error || "Payment verification failed."));
              }
              payBtn.disabled = true;
              payBtn.style.display = "none";
              paymentStatus.textContent = "Payment successful. Plan activated. You can close this tab and continue in extension.";
              try {
                localStorage.setItem("rd_upgrade_success", JSON.stringify({
                  at: new Date().toISOString(),
                  companyId: String(latestCtx?.companyId || ""),
                  planCode: String(latestCtx?.planCode || "")
                }));
              } catch {}
              try {
                if (window.opener && !window.opener.closed) {
                  window.opener.postMessage({
                    type: "RSD_UPGRADE_SUCCESS",
                    companyId: String(latestCtx?.companyId || ""),
                    planCode: String(latestCtx?.planCode || "")
                  }, "*");
                }
              } catch {}
              try {
                setTimeout(() => window.close(), 800);
              } catch {}
            }
          });
          rzp.open();
        } catch (error) {
          alert(String(error?.message || error));
        }
      });
    </script>
  </body>
</html>
