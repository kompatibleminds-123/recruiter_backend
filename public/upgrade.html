<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecruitDesk Upgrade</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f6f8fb;
        color: #1f2937;
      }
      .wrap {
        max-width: 760px;
        margin: 24px auto;
        padding: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 14px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .muted {
        color: #6b7280;
      }
      .row {
        margin-top: 14px;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f9fbff;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        background: #0f766e;
        color: #fff;
      }
      .small {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Upgrade Workspace</h1>
        <div class="muted">Continue your RecruitDesk plan activation.</div>
        <div class="row">
          <div><strong>Selected plan:</strong> <span id="planLabel">-</span></div>
          <div><strong>Company ID:</strong> <span id="companyId">-</span></div>
          <div><strong>Email:</strong> <span id="email">-</span></div>
        </div>
        <a id="contactBtn" class="btn" href="#" target="_blank" rel="noopener noreferrer">Continue on WhatsApp</a>
        <div class="muted small">Payment checkout wiring can be plugged here (Razorpay/Stripe) in next step.</div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const plan = String(params.get("plan") || "").trim();
      const companyId = String(params.get("companyId") || "").trim();
      const email = String(params.get("email") || "").trim();
      const planMap = {
        ext_499_1_user: "Extension Lite - Rs 499",
        ext_999_3_users: "Extension Team - Rs 999",
        ext_1999_7_users: "Extension Pro - Rs 1999",
        saas_4999_unlimited: "SaaS - Rs 4999"
      };
      const label = planMap[plan] || plan || "Not selected";
      document.getElementById("planLabel").textContent = label;
      document.getElementById("companyId").textContent = companyId || "-";
      document.getElementById("email").textContent = email || "-";

      const msg = encodeURIComponent(
        `Hi, I want to upgrade RecruitDesk.\nPlan: ${label}\nCompany ID: ${companyId || "-"}\nEmail: ${email || "-"}`
      );
      document.getElementById("contactBtn").href = `https://wa.me/919999999999?text=${msg}`;
    </script>
  </body>
</html>
