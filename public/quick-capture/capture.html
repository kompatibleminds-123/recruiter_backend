<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102a43" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/quick-capture/manifest.json" />
    <link rel="apple-touch-icon" href="/quick-capture/icon-192.png" />
    <link rel="stylesheet" href="/quick-capture/style.css" />
    <title>Candidate Quick Capture</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="app-topbar">
        <div class="app-topbar-copy">
          <p class="eyebrow">RecruitDesk AI</p>
          <h1>Quick Capture</h1>
          <p class="subcopy">Step 2: capture recruiter notes, parse for review, then save only after validation.</p>
        </div>
        <div class="hero-actions topbar-stack">
          <a class="secondary-link topbar-link" href="/quick-capture/">Login</a>
          <a class="secondary-link topbar-link" href="/quick-capture/list.html">Drafts</a>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Candidate Details</h2>
          <span class="panel-kicker">Structured input</span>
        </div>
        <div class="quick-form-grid">
          <label class="field">
            <span class="label">Candidate name</span>
            <input id="candidateName" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Current company</span>
            <input id="candidateCompany" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Role</span>
            <input id="candidateRole" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Experience</span>
            <input id="candidateExperience" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Location</span>
            <input id="candidateLocation" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Current CTC</span>
            <input id="candidateCurrentCtc" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Expected CTC</span>
            <input id="candidateExpectedCtc" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Notice period</span>
            <input id="candidateNoticePeriod" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Phone</span>
            <input id="candidatePhone" class="text-input" type="text" />
          </label>
          <label class="field">
            <span class="label">Email</span>
            <input id="candidateEmail" class="text-input" type="email" />
          </label>
          <label class="field field-full">
            <span class="label">LinkedIn</span>
            <input id="candidateLinkedin" class="text-input" type="text" />
          </label>
          <label class="field field-full">
            <span class="label">Next action</span>
            <input id="candidateNextAction" class="text-input" type="text" />
          </label>
        </div>

        <div class="panel-head panel-head-note">
          <h2>Quick Note</h2>
          <span class="panel-kicker">Free-form note</span>
        </div>
        <label class="label" for="noteInput">Quick candidate note</label>
        <textarea id="noteInput" class="note-input" rows="7"></textarea>

        <div class="actions sticky-actions">
          <button id="micButton" type="button" class="ghost-button">Start voice input</button>
          <button id="parseButton" type="button" class="ghost-button">Parse for review</button>
          <button id="saveButton" type="button" class="primary-button" disabled hidden>Save candidate</button>
        </div>

        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Captured Candidate Summary</h2>
          <span class="panel-kicker">Review before save</span>
        </div>
        <div id="mergeContext" class="helper-text" hidden></div>
        <div id="conflictSummary" class="conflict-summary" hidden></div>
        <div id="candidateSummary" class="candidate-summary empty">No captured data yet.</div>
        <details class="raw-output-toggle">
          <summary>Show raw data</summary>
          <pre id="jsonOutput" class="json-output">No parsed data yet.</pre>
        </details>
      </section>
    </main>

    <script src="/quick-capture/auth.js"></script>
    <script src="/quick-capture/script.js"></script>
  </body>
</html>
