<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102a43" />
    <link rel="manifest" href="/quick-capture/manifest.json" />
    <link rel="stylesheet" href="/quick-capture/style.css" />
    <title>Saved Candidates</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="panel auth-panel">
        <div class="panel-head">
          <h2>Draft Notes</h2>
          <span class="panel-kicker">Step 3</span>
        </div>
        <div id="authLoggedOut">
          <p class="subcopy">Login required to view recruiter-scoped saved candidates.</p>
          <div class="hero-actions">
            <a class="secondary-link" href="/quick-capture/">Go to login</a>
          </div>
        </div>
        <div id="authLoggedIn" hidden>
          <div id="authSummary" class="auth-summary"></div>
          <div class="actions">
            <button id="logoutButton" type="button" class="ghost-button">Logout</button>
          </div>
        </div>
        <p id="authStatus" class="status-message" role="status" aria-live="polite"></p>
      </section>

      <section class="app-topbar">
        <p class="eyebrow">Candidate Quick Capture</p>
        <h1>Saved draft notes</h1>
        <p class="subcopy">Search and review recruiter-scoped quick-capture notes without clutter.</p>
        <div class="hero-actions">
          <a class="secondary-link" href="/quick-capture/">Login</a>
          <a class="secondary-link" href="/quick-capture/capture.html">Capture</a>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Candidate cards</h2>
          <button id="refreshButton" type="button" class="ghost-button">Refresh</button>
        </div>
        <label class="field field-full" for="searchInput">
          <span class="label">Search drafts</span>
          <input id="searchInput" class="text-input" type="search" placeholder="Search by candidate, company, role, phone, email..." />
        </label>
        <p id="listStatus" class="status-message" role="status" aria-live="polite"></p>
        <div id="candidateList" class="card-list"></div>
      </section>
    </main>

    <script src="/quick-capture/auth.js"></script>
    <script src="/quick-capture/list.js"></script>
  </body>
</html>
